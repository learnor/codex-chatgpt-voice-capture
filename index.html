<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Capture - 极简收集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">VOICE CAPTURE</p>
        <p id="version" class="version">v--</p>
        <h1>一句话，先收集</h1>
        <p class="sub">todo、灵感、提醒、杂事，先说出来，稍后整理。</p>
      </header>

      <section class="input-card">
        <label class="capture-label" for="noteText">快速记录</label>
        <div class="dictation-card">
          <textarea id="noteText" rows="5" placeholder="轻触这里，然后使用键盘上的麦克风说话..."></textarea>
          <p class="dictation-hint">手机上请点击键盘的麦克风图标开始听写</p>
        </div>

        <div class="actions">
          <button id="saveBtn" class="primary" type="button">保存</button>
          <button id="clearBtn" type="button">清空</button>
        </div>
        <p id="status" class="status" aria-live="polite">等待输入</p>
      </section>

      <section class="list-card">
        <div class="list-head">
          <h2>收集箱</h2>
          <button id="wipeBtn" class="danger" type="button">清空全部</button>
        </div>
        <ul id="items"></ul>
      </section>
    </main>

    <template id="itemTemplate">
      <li class="item">
        <div class="meta">
          <span class="tag"></span>
          <time></time>
        </div>
        <p class="content"></p>
        <button class="delete-btn" type="button">删除</button>
      </li>
    </template>

    <script src="./app.js?v=2026.05.26.1"></script>
  </body>
</html>
